server:
  port: ${SERVICE_HOST:8081}  # Make sure it's unique per service

spring:
  application:
    name: product-service  # This is important for Eureka registration

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5000}/ecommerce_akmal
    username: ${DB_USERNAME:ecommerce-akmal}
    password: ${DB_PASSWORD:akmal2121234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none  # "validate", "create", "create-drop", or "update"
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false  # helpful for development

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

# Datadog Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      datadog:
        enabled: true
        api-key: ${DD_API_KEY:your-datadog-api-key}
        application-key: ${DD_APP_KEY:your-datadog-app-key}
        step: 30s
        descriptions: true
        host-tag: ${DD_HOST:localhost}
        service: product-service
        source: spring-boot
