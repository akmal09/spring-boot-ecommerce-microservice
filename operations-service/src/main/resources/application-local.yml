server:
  port: 8081 # Make sure it's unique per service

spring:
  application:
    name: operations-service  # This is important for Eureka registration

  datasource:
    url: jdbc:otel:postgresql://localhost:5000/ecommerce_akmal
    username: ecommerce-akmal
    password: akmal2121234

  jpa:
    hibernate:
      ddl-auto: none  # "validate", "create", "create-drop", or "update"
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false  # helpful for development

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

otel:
  exporter:
    otlp:
      endpoint: http://localhost:4318
  service:
    name: operations-service
