server:
  port: 8081 # Make sure it's unique per service

spring:
  application:
    name: operations-service  # This is important for Eureka registration

  datasource:
    url: jdbc:postgresql://localhost:5000/ecommerce_akmal
    username: ecommerce-akmal
    password: akmal2121234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none  # "validate", "create", "create-drop", or "update"
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false  # helpful for development

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# OpenTelemetry Configuration for Local Development
otel:
  service:
    name: operations-service
    version: 1.0.0
  resource:
    attributes:
      service.name: operations-service
      service.version: 1.0.0
      deployment.environment: local
  exporter:
    otlp:
      endpoint: http://localhost:4317
      protocol: grpc
      timeout: 30s
  traces:
    exporter: otlp
  metrics:
    exporter: otlp
  logs:
    exporter: otlp
  instrumentation:
    spring-webmvc:
      enabled: true
    jdbc:
      enabled: true
    http-clients:
      enabled: true
    logback-appender:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,traces
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0

# Logging configuration
logging:
  level:
    com.project.operations: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId},%X{spanId}] %logger{36} - %msg%n"
