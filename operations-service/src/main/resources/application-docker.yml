server:
  port: ${SERVICE_HOST:8081}  # Make sure it's unique per service

spring:
  application:
    name: operations-service  # This is important for Eureka registration

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5000}/ecommerce_akmal
    username: ${DB_USERNAME:ecommerce-akmal}
    password: ${DB_PASSWORD:akmal2121234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none  # "validate", "create", "create-drop", or "update"
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false  # helpful for development

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

# OpenTelemetry Configuration
otel:
  service:
    name: operations-service
    version: 1.0.0
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
      headers: ${OTEL_EXPORTER_OTLP_HEADERS:}
  traces:
    exporter: otlp
  metrics:
    exporter: otlp
  logs:
    exporter: otlp
  instrumentation:
    spring-webmvc:
      enabled: true
    jdbc:
      enabled: true
    http-clients:
      enabled: true
    logback-appender:
      enabled: true

# Datadog Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      datadog:
        enabled: true
        api-key: ${DD_API_KEY:your-datadog-api-key}
        application-key: ${DD_APP_KEY:your-datadog-app-key}
        step: 30s
        descriptions: true
        host-tag: ${DD_HOST:localhost}
        service: operations-service
        source: spring-boot
  tracing:
    sampling:
      probability: 1.0

# Logging configuration for better observability
logging:
  level:
    com.project.operations: DEBUG
    org.springframework.web: INFO
    org.springframework.jdbc: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId},%X{spanId}] %logger{36} - %msg%n"
