receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    limit_mib: 512
  
  # Add resource attributes for better identification
  resource:
    attributes:
      - key: collector.name
        value: "otel-collector-main"
        action: insert
      - key: collector.version
        value: "latest"
        action: insert

exporters:
  # Console exporter for debugging - see data in collector logs
  logging:
    loglevel: debug
    sampling_initial: 5
    sampling_thereafter: 200

  # File exporter to save data locally for verification
  file:
    path: /tmp/otel-data/traces.json
    rotation:
      max_megabytes: 10
      max_days: 3
      max_backups: 3

  # Prometheus exporter for metrics
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: "otel"
    const_labels:
      collector: "main"

  # OTLP exporter (for future LGTM stack)
  otlp/lgtm:
    endpoint: http://tempo:4317  # Will be used later for LGTM
    tls:
      insecure: true
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 1000

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]
  
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [logging, file]  # Start with local exporters
    
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [logging, prometheus]
    
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [logging, file]

  telemetry:
    logs:
      level: "debug"
    metrics:
      address: 0.0.0.0:8888