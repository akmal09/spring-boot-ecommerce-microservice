apiVersion: apps/v1
kind: Deployment
metadata:
  name: operations-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: operations-service
  template:
    metadata:
      labels:
        app: operations-service
    spec:
      containers:
        - name: operations-service
          image: akmal23/operations-service:latest
          ports:
            - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: operations-service
spec:
  selector:
    app: operations-service
  ports:
    - port: 8081
      targetPort: 8081
  type: LoadBalancer
