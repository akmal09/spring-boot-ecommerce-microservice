version: '3.8'

services:
  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    container_name: datadog-agent
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=datadoghq.com
      - DD_HOSTNAME=ecommerce-host
      - DD_TAGS=env:development,service:ecommerce
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      - DD_PROCESS_AGENT_ENABLED=true
      - DD_DOCKER_LABELS_AS_TAGS=true
      - DD_CONTAINER_EXCLUDE="name:datadog-agent"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /opt/datadog-agent/run:/opt/datadog-agent/run:rw
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    ports:
      - "8126:8126"  # APM traces
      - "8125:8125/udp"  # DogStatsD
    networks:
      - ecommerce-network

  # Your existing services with Datadog integration
  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - DD_AGENT_HOST=datadog-agent
      - DD_TRACE_AGENT_PORT=8126
      - DD_SERVICE=eureka-server
      - DD_ENV=development
      - DD_VERSION=1.0.0
    labels:
      com.datadoghq.ad.logs: '[{"source": "java", "service": "eureka-server"}]'
    networks:
      - ecommerce-network
    depends_on:
      - datadog-agent

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    ports:
      - "8081:8081"
    environment:
      - SERVICE_HOST=8081
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=ecommerce-akmal
      - DB_PASSWORD=akmal2121234
      - EUREKA_HOST=eureka-server
      - DD_AGENT_HOST=datadog-agent
      - DD_TRACE_AGENT_PORT=8126
      - DD_SERVICE=product-service
      - DD_ENV=development
      - DD_VERSION=1.0.0
      - DD_API_KEY=${DD_API_KEY}
      - DD_APP_KEY=${DD_APP_KEY}
    labels:
      com.datadoghq.ad.logs: '[{"source": "java", "service": "product-service"}]'
    networks:
      - ecommerce-network
    depends_on:
      - eureka-server
      - postgres
      - datadog-agent

  operations-service:
    build:
      context: ./operations-service
      dockerfile: Dockerfile
    container_name: operations-service
    ports:
      - "8082:8082"
    environment:
      - SERVICE_HOST=8082
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=ecommerce-akmal
      - DB_PASSWORD=akmal2121234
      - EUREKA_HOST=eureka-server
      - DD_AGENT_HOST=datadog-agent
      - DD_TRACE_AGENT_PORT=8126
      - DD_SERVICE=operations-service
      - DD_ENV=development
      - DD_VERSION=1.0.0
      - DD_API_KEY=${DD_API_KEY}
      - DD_APP_KEY=${DD_APP_KEY}
    labels:
      com.datadoghq.ad.logs: '[{"source": "java", "service": "operations-service"}]'
    networks:
      - ecommerce-network
    depends_on:
      - eureka-server
      - postgres
      - datadog-agent

  postgres:
    image: postgres:15
    container_name: postgres-ecommerce
    environment:
      - POSTGRES_DB=ecommerce_akmal
      - POSTGRES_USER=ecommerce-akmal
      - POSTGRES_PASSWORD=akmal2121234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge

volumes:
  postgres_data: