name: Java CI/CD with Maven and Kubernetes

on:
  push:
    branches:
      - development

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ 'eureka-server', 'operations-service']
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: |
          cd ${{ matrix.service }}/
          mvn clean install -DskipTests
    
  build_and_test_with_config:
    name: Build Product Service (Depends on Config)
    runs-on: ubuntu-latest
    needs: build_and_test  # optional dependency
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Product Service
        run: |
          cd config/
          mvn clean install         
          cd ../product-service
          mvn clean install

  build_and_push_docker_image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build_and_test
    strategy:
      matrix:
        service: [ 'eureka-server', 'operations-service', 'product-service' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -f ${{ matrix.service }}/pom.xml clean install -DskipTests

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest

  deploy_to_kubernetes:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build_and_push_docker_image
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.25.0' # Or any other version

      - name: Configure Kubeconfig
        run: |
          mkdir -p ${HOME}/.kube
          echo "${{ secrets.KUBECONFIG }}" > ${HOME}/.kube/config

      - name: Deploy Eureka Server
        run: kubectl apply -f k8s/eureka-server-deployment.yml

      - name: Deploy Operations Service
        run: kubectl apply -f k8s/operations-service-deployment.yml

      - name: Deploy Product Service
        run: kubectl apply -f k8s/product-service-deployment.yml
